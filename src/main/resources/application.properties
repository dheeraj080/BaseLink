spring.application.name=EmILY
server.port=5000

# DATA SOURCE
spring.datasource.url=jdbc:postgresql://email-db:5432/email_db?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling / Health
# Connection Pooling / Health
spring.datasource.hikari.connection-test-query=SELECT 1


# QUARTZ
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quarts.properties.org.quartz.threadPool.threadcount=5

# JPA / HIBERNATE
spring.jpa.show-sql=true
# Use 'update' for local dev, 'validate' for prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true



spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Tell Quartz to use the PostgreSQL-specific delegate for handling BLOBs
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# Ensure the driver knows how to handle BYTEA properly (often helps with hex format issues)