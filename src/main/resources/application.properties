# App Info
spring.application.name=EmILY
server.port=5000

# DATA SOURCE
spring.datasource.url=jdbc:postgresql://email-db:5432/email_db?stringtype=unspecified
# Use environment variables for sensitive data
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# QUARTZ
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
# Fixed typo: changed 'quarts' to 'quartz' and corrected camelCase for threadCount
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# MULTIPART
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# RABBITMQ
spring.rabbitmq.host=email-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
# SECURITY WARNING: Avoid 'trust.all=true'. 
# Replace with a whitelist if possible:
# spring.amqp.deserialization.trust.trusted=com.example.package.*

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false