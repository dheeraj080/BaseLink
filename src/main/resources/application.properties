# App Info
spring.application.name=EmILY
server.port=5000
server.forward-headers-strategy=framework

# DATA SOURCE
spring.datasource.url=jdbc:postgresql://email-db:5432/email_db?stringtype=unspecified
# Use environment variables for sensitive data
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# QUARTZ
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
# Fixed typo: changed 'quarts' to 'quartz' and corrected camelCase for threadCount
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# JPA / HIBERNATE
#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.tool.schema=DEBUG
#spring.jpa.properties.hibernate.format_sql=true

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# MULTIPART
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# RABBITMQ
spring.rabbitmq.host=email-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
# SECURITY WARNING: Avoid 'trust.all=true'. 
# Replace with a whitelist if possible:
# spring.amqp.deserialization.trust.trusted=com.example.package.*

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# SECURITY PROPERTIES
security.jwt.secret=vS9p8u2M5rX7n4Q1z6W0E3t9Y4A8S5D2F1G7H3J6K9L0P3M1N4B7V2C5X8Z1Q9W0
security.jwt.access-ttl-seconds=3600
security.jwt.refresh-ttl-seconds=2592000
security.jwt.issuer=EmILY
security.jwt.refresh-token-cookie-name=refresh_token
security.jwt.cookie-http-only=true
security.jwt.cookie-secure=false
security.jwt.cookie-domain=
security.jwt.cookie-same-site=Lax

# OAUTH2 (Configure via Env vars)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

management.endpoints.web.exposure.include=*

logging.level.com.em.emily.auth.security=DEBUG
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.web.client.RestTemplate=TRACE
logging.level.org.springframework.security=TRACE

