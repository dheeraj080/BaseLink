# Override the database host for tests
#spring.datasource.url=jdbc:postgresql://localhost:5432/email_db
spring.datasource.username=your_local_db_user
spring.datasource.password=your_local_db_password

# Optional: Disable Quartz database initialization if not needed for unit tests
spring.quartz.jdbc.initialize-schema=never

spring.rabbitmq.listener.simple.auto-startup=false

#import org.springframework.boot.webmvc.test.autoconfigure.WebMvcTest;

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
